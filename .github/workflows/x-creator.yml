name: X Post Creator

on:
  # schedule:
  #   - cron: '0 22 * * *'  # JST 7:00 (UTC 22:00)
  workflow_dispatch:

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Init submodules
        env:
          PERSONA_PAT: ${{ secrets.PERSONA_PAT }}
          CONTENT_DATA_PAT: ${{ secrets.CONTENT_DATA_PAT }}
        run: |
          git config --global url."https://x-access-token:${PERSONA_PAT}@github.com/Ikedatomohiro/persona.git".insteadOf "https://github.com/Ikedatomohiro/persona.git"
          git config --global url."https://x-access-token:${CONTENT_DATA_PAT}@github.com/Ikedatomohiro/content-data.git".insteadOf "https://github.com/Ikedatomohiro/content-data.git"
          git submodule init
          git submodule update --remote

      - name: Prepare prompt
        id: prep
        env:
          ACTIVE_ACCOUNT: ${{ secrets.ACTIVE_ACCOUNT }}
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            echo "以下の手順を最初から最後まで必ず実行してください。途中で止めないでください。"
            echo ""
            echo "## 作業ディレクトリ"
            echo "sns-creator/ を基点に作業する。"
            echo ""
            echo "## ステップ1: X投稿ドラフト作成"
            echo "sns-creator/.claude/agents/x-post-writer.md の指示に従い実行する。"
            echo "プログラミング・AI分野の一次情報を収集し、X投稿ドラフトを10件作成する。"
            echo "出力先: external/content-data/sns/${ACTIVE_ACCOUNT}/x_drafts/pool.json"
            echo ""
            echo "## ステップ2: PRの作成"
            echo "以下の手順でcontent-dataリポジトリにPRを作成する："
            echo "1. cd external/content-data"
            echo "2. mkdir -p sns/${ACTIVE_ACCOUNT}/x_drafts"
            echo "3. BRANCH=\"x-drafts/\$(date +%Y-%m-%d)\""
            echo "4. git checkout -b \"\$BRANCH\""
            echo "5. git add sns/${ACTIVE_ACCOUNT}/x_drafts/"
            echo "6. git commit -m 'content: X投稿ドラフト生成 \$(date +%Y-%m-%d)'"
            echo "7. git remote set-url origin \"https://x-access-token:\${CONTENT_DATA_PAT}@github.com/Ikedatomohiro/content-data.git\""
            echo "8. git push origin \"\$BRANCH\""
            echo "9. GH_TOKEN=\"\${CONTENT_DATA_PAT}\" gh pr create --repo Ikedatomohiro/content-data --base main --head \"\$BRANCH\" --title 'feat: X投稿ドラフト (\$(date +%Y-%m-%d))' --body '生成した投稿数・カテゴリ内訳・使用トピック一覧を記載する'"
            echo "10. cd ../.."
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          ACTIVE_ACCOUNT: ${{ secrets.ACTIVE_ACCOUNT }}
          CONTENT_DATA_PAT: ${{ secrets.CONTENT_DATA_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--model claude-opus-4-6"
          prompt: ${{ steps.prep.outputs.prompt }}
          additional_permissions: |
            actions: read
            pull-requests: write
            contents: write
            issues: write
          settings: |
            {
              "permissions": {
                "allow": ["Bash", "Read", "Write", "Edit", "WebSearch", "WebFetch"],
                "deny": ["Bash(git push --force:*)", "Bash(git push -f:*)"]
              }
            }

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SNS_ADVISOR_URL }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            ICON=":white_check_mark:"
            TEXT="X投稿ドラフト生成完了 ($(date +%Y-%m-%d))\nPRが content-data に作成されました。"
          else
            ICON=":x:"
            TEXT="X投稿ドラフト生成に失敗しました ($(date +%Y-%m-%d))\nジョブログを確認してください。\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"${ICON} *X Post Creator* ${TEXT}\"}"
