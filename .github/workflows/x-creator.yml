name: X Post Creator

on:
  # schedule:
  #   - cron: '0 22 * * *'  # JST 7:00 (UTC 22:00)
  workflow_dispatch:

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Init submodules
        env:
          PERSONA_PAT: ${{ secrets.PERSONA_PAT }}
          CONTENT_DATA_PAT: ${{ secrets.CONTENT_DATA_PAT }}
        run: |
          git config --global url."https://x-access-token:${PERSONA_PAT}@github.com/Ikedatomohiro/persona.git".insteadOf "https://github.com/Ikedatomohiro/persona.git"
          git config --global url."https://x-access-token:${CONTENT_DATA_PAT}@github.com/Ikedatomohiro/content-data.git".insteadOf "https://github.com/Ikedatomohiro/content-data.git"
          git submodule init
          git submodule update --remote

      - name: Prepare prompt
        id: prep
        env:
          ACTIVE_ACCOUNT: ${{ secrets.ACTIVE_ACCOUNT }}
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            echo "以下の手順を最初から最後まで必ず実行してください。途中で止めないでください。"
            echo ""
            echo "## 作業ディレクトリ"
            echo "sns-creator/ を基点に作業する。"
            echo ""
            echo "## ステップ1: X投稿ドラフト作成"
            echo "sns-creator/.claude/agents/x-post-writer.md の指示に従い実行する。"
            echo "プログラミング・AI分野の一次情報を収集し、X投稿ドラフトを10件作成する。"
            echo "出力先: external/content-data/sns/${ACTIVE_ACCOUNT}/x_drafts/pool.json"
            echo ""
            echo "## ステップ2: PRの作成"
            echo "以下の手順でcontent-dataリポジトリにPRを作成する："
            echo "1. cd external/content-data"
            echo "2. mkdir -p sns/${ACTIVE_ACCOUNT}/x_drafts"
            echo "3. BRANCH=\"x-drafts/\$(date +%Y-%m-%d)\""
            echo "4. git checkout -b \"\$BRANCH\""
            echo "5. git add sns/${ACTIVE_ACCOUNT}/x_drafts/"
            echo "6. git commit -m 'content: X投稿ドラフト生成 \$(date +%Y-%m-%d)'"
            echo "7. git remote set-url origin \"https://x-access-token:\${CONTENT_DATA_PAT}@github.com/Ikedatomohiro/content-data.git\""
            echo "8. git push origin \"\$BRANCH\""
            echo "9. GH_TOKEN=\"\${CONTENT_DATA_PAT}\" gh pr create --repo Ikedatomohiro/content-data --base main --head \"\$BRANCH\" --title 'feat: X投稿ドラフト (\$(date +%Y-%m-%d))' --body '生成した投稿数・カテゴリ内訳・使用トピック一覧を記載する'"
            echo "10. cd ../.."
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          ACTIVE_ACCOUNT: ${{ secrets.ACTIVE_ACCOUNT }}
          CONTENT_DATA_PAT: ${{ secrets.CONTENT_DATA_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--model claude-opus-4-6"
          prompt: ${{ steps.prep.outputs.prompt }}
          additional_permissions: |
            actions: read
            pull-requests: write
            contents: write
            issues: write
          settings: |
            {
              "permissions": {
                "allow": ["Bash", "Read", "Write", "Edit", "WebSearch", "WebFetch"],
                "deny": ["Bash(git push --force:*)", "Bash(git push -f:*)"]
              }
            }

      - name: Notify Slack with drafts
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SNS_ADVISOR_URL }}
          ACTIVE_ACCOUNT: ${{ secrets.ACTIVE_ACCOUNT }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request
          from datetime import date, timezone, timedelta

          account = os.environ.get("ACTIVE_ACCOUNT", "pao-pao-cho")
          pool_path = f"external/content-data/sns/{account}/x_drafts/pool.json"
          today = date.today().isoformat()

          try:
              with open(pool_path) as f:
                  drafts = json.load(f)
          except Exception as e:
              print(f"pool.json の読み込みに失敗: {e}")
              exit(0)

          # 本日生成分を抽出、なければ末尾10件
          today_drafts = [d for d in drafts if d.get("created_at", "").startswith(today)]
          if not today_drafts:
              today_drafts = drafts[-10:]

          lines = [f"*📝 X投稿ドラフト {today} — {len(today_drafts)}件*\n"]
          for i, d in enumerate(today_drafts, 1):
              content = d.get("content", "")
              url = d.get("source_url", "")
              lines.append(f"{i}. {content}\n🔗 {url}")

          text = "\n\n".join(lines)
          payload = json.dumps({"text": text}).encode("utf-8")

          webhook_url = os.environ.get("SLACK_WEBHOOK_URL", "")
          req = urllib.request.Request(
              webhook_url, data=payload,
              headers={"Content-Type": "application/json"}, method="POST"
          )
          with urllib.request.urlopen(req) as res:
              print(f"Slack 通知完了: HTTP {res.status}")
          EOF

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SNS_ADVISOR_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \":x: *X Post Creator* 生成に失敗しました (${{ github.run_id }})\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
