name: SNS Poster (Scheduled Posts)

on:
  # schedule:
  #   # JST 10:00, 13:00, 18:00 = UTC 1:00, 4:00, 9:00
  #   - cron: '0 1 * * *'
  #   - cron: '0 4 * * *'
  #   - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode'
        type: boolean
        default: false
      limit:
        description: 'Max posts to publish'
        type: string
        default: '1'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Init content-data submodule
        env:
          CONTENT_DATA_PAT: ${{ secrets.CONTENT_DATA_PAT }}
        run: |
          git config --global url."https://x-access-token:${CONTENT_DATA_PAT}@github.com/Ikedatomohiro/content-data.git".insteadOf "https://github.com/Ikedatomohiro/content-data.git"
          git submodule init external/content-data
          git submodule update --remote external/content-data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run poster
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          ACTIVE_ACCOUNT: ${{ secrets.ACTIVE_ACCOUNT }}
          OPERATION_MODE: ${{ secrets.OPERATION_MODE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLISH_API_URL: ${{ secrets.PUBLISH_API_URL }}
          DATA_ROOT: ${{ github.workspace }}/external/content-data/sns
        run: |
          LIMIT="${{ github.event.inputs.limit || '1' }}"
          DRY_RUN_FLAG="${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}"
          cd sns-creator
          python scripts/run_poster.py --account "$ACTIVE_ACCOUNT" --limit "$LIMIT" $DRY_RUN_FLAG

      - name: Commit and push data changes
        env:
          CONTENT_DATA_PAT: ${{ secrets.CONTENT_DATA_PAT }}
        run: |
          cd external/content-data
          git config user.name "Content Pipeline Bot"
          git config user.email "bot@content-pipeline.local"
          git add .
          git diff --staged --quiet || git commit -m "chore: update data from poster run $(date +%Y-%m-%dT%H:%M)"
          git remote set-url origin "https://x-access-token:${CONTENT_DATA_PAT}@github.com/Ikedatomohiro/content-data.git"
          git pull --rebase origin main
          git push origin main
