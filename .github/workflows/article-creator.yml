name: Article Creator (Claude Code)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Init submodules
        env:
          PERSONA_PAT: ${{ secrets.PERSONA_PAT }}
          CONTENT_DATA_PAT: ${{ secrets.CONTENT_DATA_PAT }}
        run: |
          git config --global url."https://x-access-token:${PERSONA_PAT}@github.com/Ikedatomohiro/persona.git".insteadOf "https://github.com/Ikedatomohiro/persona.git"
          git config --global url."https://x-access-token:${CONTENT_DATA_PAT}@github.com/Ikedatomohiro/content-data.git".insteadOf "https://github.com/Ikedatomohiro/content-data.git"
          git submodule init
          git submodule update --remote

      - name: Setup Python and build persona vector DB
        run: |
          pip install -r requirements.txt
          pip install "chromadb>=0.5.0"
          python3 sns-creator/scripts/build_persona_vectordb.py

      - name: Prepare prompt
        id: prep
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          ACTIVE_ACCOUNT: ${{ secrets.ACTIVE_ACCOUNT }}
        run: |
          {
            echo 'prompt<<PROMPT_EOF'
            echo "以下の手順を最初から最後まで必ず実行してください。途中で止めないでください。"
            echo ""
            echo "## 作業ディレクトリ"
            echo "article-creator/ を基点に作業する。"
            echo ""
            echo "## ステップ1: ネタ探し"
            echo "Web検索を使って、以下の3軸から今話題のトピックを各1つ調査してください："
            echo "1. 資産形成（NISA・iDeCo・投資・節税・保険）"
            echo "2. AI・Claude Code（エンジニア視点での活用術・実体験）"
            echo "3. エンジニアとしての働き方・生産性"
            echo "異なるカテゴリを混ぜた記事ネタは禁止です。1ネタ1カテゴリを守ってください。"
            echo ""
            echo "## ステップ2: 記事作成（マルチエージェント）"
            echo "\`article-creator/.claude/agents/\` の各エージェント定義（agent-00〜10）に従い実行："
            echo "1. Agent 0 ディレクター: ブリーフ作成（ペルソナ検索 → _brief.json）"
            echo "2. Agent 1（リサーチ）: Web調査・情報整理"
            echo "3. Agent 3 ⇄ Agent 4（最大2回）: 構成設計 → 構成チェック"
            echo "4. Agent 5 → Agent 6（直列）: 本文執筆 → 校正"
            echo "5. Agent 7 + Agent 8（並列）: ファクトチェック（一次ソース確認必須） + デザイン・画像選定"
            echo "6. ディレクター: 最終統合 → article.md, meta.json, factcheck.json 出力"
            echo "7. Agent 10 ⇄ Agent 6（最大3回）: 品質レビュー → 修正"
            echo "8. 中間ファイル（_プレフィックス付き）は削除せず、そのまま残す"
            echo "出力先: external/content-data/articles/${ACTIVE_ACCOUNT}/outputs/\$(date +%Y%m%d)/{slug}/"
            echo "ペルソナの声を反映し、「僕」の一人称・個人的なスタンス・エピソードを織り込むこと。"
            echo ""
            echo "## ステップ3: content-dataに記事ごとPR作成"
            echo "作成した記事のslugリストを取得し、各記事に対して以下を繰り返す:"
            echo ""
            echo "【各記事ごとに以下を実行】"
            echo "1. cd external/content-data"
            echo "2. git checkout main && git pull origin main"
            echo "3. BRANCH=\"article/\$(date +%Y%m%d)-{slug}\""
            echo "4. git checkout -b \"\$BRANCH\""
            echo "5. git add articles/${ACTIVE_ACCOUNT}/outputs/\$(date +%Y%m%d)/{slug}/"
            echo "6. git commit -m \"feat: {記事タイトル}\""
            echo "7. git remote set-url origin \"https://x-access-token:\${CONTENT_DATA_PAT}@github.com/Ikedatomohiro/content-data.git\""
            echo "8. git push origin \"\$BRANCH\""
            echo "9. GH_TOKEN=\"\${CONTENT_DATA_PAT}\" gh pr create --repo Ikedatomohiro/content-data --base main --head \"\$BRANCH\" --title \"📝 {記事タイトル}\" --body \"{概要}\""
            echo "10. cd ../.."
            echo ""
            echo "全記事分繰り返す。記事が複数あれば必ず記事ごとに別ブランチ・別PRを作成すること。"
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTENT_DATA_PAT: ${{ secrets.CONTENT_DATA_PAT }}
          ACTIVE_ACCOUNT: ${{ secrets.ACTIVE_ACCOUNT }}
          ARTICLE_OUTPUT_DIR: ${{ github.workspace }}/external/content-data/articles
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--model claude-opus-4-6"
          prompt: ${{ steps.prep.outputs.prompt }}
          additional_permissions: |
            actions: read
            pull-requests: write
            contents: write
            issues: write
          settings: |
            {
              "permissions": {
                "allow": ["Bash", "Read", "Write", "Edit", "WebSearch", "WebFetch"],
                "deny": ["Bash(git push --force:*)", "Bash(git push -f:*)"]
              }
            }
